<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth & Death Registration Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px 30px;
            max-width: 600px;
            text-align: center;
        }
        .welcome-container h1 {
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .welcome-container p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .btn-custom {
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 10px;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            text-align: left;
        }
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        .feature i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .feature h5 {
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1><i class="fas fa-certificate"></i> Registration Portal</h1>
        <p>Manage your birth and death certificate applications easily and securely.</p>
        
        <a href="admin/index.php" class="btn btn-primary btn-custom">
            <i class="fas fa-sign-in-alt"></i> Go to Dashboard
        </a>
        <a href="admin/index.php" class="btn btn-outline-primary btn-custom">
            <i class="fas fa-info-circle"></i> Learn More
        </a>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-file-alt"></i>
                <h5>Birth Certificate</h5>
                <p>Apply and download</p>
            </div>
            <div class="feature">
                <i class="fas fa-file-invoice"></i>
                <h5>Death Certificate</h5>
                <p>Apply and download</p>
            </div>
            <div class="feature">
                <i class="fas fa-wallet"></i>
                <h5>Wallet System</h5>
                <p>Manage payments</p>
            </div>
            <div class="feature">
                <i class="fas fa-user-circle"></i>
                <h5>User Profile</h5>
                <p>View & edit info</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
